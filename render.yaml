services:
  - type: web
    name: ticketbooking-backend
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/shows/1/seats
    envVars:
      - key: DATABASE_PATH
        value: /var/data/cinema.db
    disk:
      name: cinema-data
      mountPath: /var/data
      sizeGB: 1